name: "🐛 Bug Report"
about: Report a bug or unexpected behavior in Haze Launcher
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Haze Launcher Version
      placeholder: "e.g. 0.59.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Windows 11 22H2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what is going wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open launcher
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Launcher Logs
      description: Paste relevant logs from `%AppData%\hazeclient\logs\main.log`
      render: text
